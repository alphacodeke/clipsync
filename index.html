<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Copy to Clipboard · Instant Copy Tool</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background:#8687d3 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Inter', 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
    }

    /* main card */
    .copy-card {
      max-width: 620px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(0px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 6px rgba(0, 0, 0, 0.02);
      padding: 2rem 2rem 2.2rem;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    h1 {
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #1a2a3a, #0f1a24);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.4rem;
    }

    .sub {
      color: #5b6e7c;
      font-weight: 450;
      margin-bottom: 1.8rem;
      border-left: 3px solid #3b82f6;
      padding-left: 0.8rem;
      font-size: 0.95rem;
    }

    /* input group */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
    }

    label {
      font-weight: 550;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #2c3e44;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label svg {
      opacity: 0.7;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }

    textarea {
      width: 100%;
      padding: 1rem 1.2rem;
      font-size: 1rem;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: #ffffff;
      border: 1.5px solid #e2e8f0;
      border-radius: 1.6rem;
      resize: vertical;
      transition: all 0.2s;
      color: #0f172a;
      line-height: 1.4;
      outline: none;
      font-weight: 470;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
      outline: none;
    }

    /* button row */
    .action-area {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.6rem;
    }

    .copy-btn {
      background: #0f172a;
      border: none;
      padding: 0.85rem 1.8rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
      flex: 1;
      justify-content: center;
      letter-spacing: 0.2px;
    }

    .copy-btn:hover {
      background: #1e293b;
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -12px rgba(15, 23, 42, 0.3);
    }

    .copy-btn:active {
      transform: translateY(1px);
    }

    .copy-btn.success {
      background: #0f3b2c;
      background: linear-gradient(110deg, #15803d, #166534);
      box-shadow: 0 6px 14px rgba(21, 128, 61, 0.2);
    }

    .status-area {
      background: #f1f5f9;
      border-radius: 2rem;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #1e293b;
      font-weight: 500;
      border: 1px solid #e2edf2;
    }

    .status-icon {
      font-size: 1.1rem;
      line-height: 1;
    }

    .status-message {
      flex: 1;
    }

    .clear-tip {
      font-size: 0.7rem;
      color: #5e727d;
      margin-top: 1rem;
      text-align: center;
      border-top: 1px solid #e9edf2;
      padding-top: 1.2rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .clear-tip span {
      cursor: pointer;
      background: transparent;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
      transition: 0.1s;
    }

    .clear-tip span:hover {
      background: #e9edf2;
      text-decoration: underline;
    }

    button {
      background: none;
      border: none;
    }

    @media (max-width: 500px) {
      .copy-card {
        padding: 1.5rem;
      }
      .copy-btn {
        padding: 0.7rem 1.2rem;
      }
      h1 {
        font-size: 1.5rem;
      }
    }

    @keyframes gentlePulse {
      0% { opacity: 0.7; transform: scale(0.98);}
      100% { opacity: 1; transform: scale(1);}
    }
    .copy-card {
      animation: gentlePulse 0.3s ease-out;
    }

    .footer-note {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 1rem;
      color: #8198a5;
    }
  </style>
</head>
<body>

<div class="copy-card" role="main">
  <h1>📋 ClipSync</h1>
  <div class="sub">Copy any text to clipboard · instant & secure</div>

  <div class="input-group">
    <label>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 4L20 20L4 20L4 4L20 4Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8 8H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M8 12H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M8 16H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      TEXT INPUT
    </label>
    <div class="input-wrapper">
      <textarea id="textInput" rows="3" placeholder="Type or paste anything here...&#10;URL, notes, code, or any text you need to copy."></textarea>
    </div>
  </div>

  <div class="action-area">
    <button class="copy-btn" id="copyButton" aria-label="Copy to clipboard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M5 15H4C2.89543 15 2 14.1046 2 13V4C2 2.89543 2.89543 2 4 2H13C14.1046 2 15 2.89543 15 4V5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Copy to clipboard
    </button>
  </div>

  <div class="status-area" id="statusArea">
    <div class="status-icon"><i class="fas fa-info-circle"></i></div>
    <div class="status-message" id="statusMessage">Ready — click copy to save text</div>
  </div>
  
  <div class="clear-tip">
    <span id="clearBtn" role="button"><i class="fas fa-trash-alt"></i> Clear input</span>
    <span id="sampleBtn" role="button"><i class="fas fa-star"></i> Insert sample text</span>
  </div>
  <div class="footer-note">
    ⚡ Works on any modern browser · Copies exactly what's in the field
  </div>
</div>

<script>
  (function() {
    const textarea = document.getElementById('textInput');
    const copyButton = document.getElementById('copyButton');
    const statusMessageSpan = document.getElementById('statusMessage');
    const statusAreaDiv = document.getElementById('statusArea');
    const clearBtn = document.getElementById('clearBtn');
    const sampleBtn = document.getElementById('sampleBtn');

    function updateStatus(message, type = 'info') {
      statusMessageSpan.textContent = message;
      
      const iconDiv = statusAreaDiv.querySelector('.status-icon');
      if (type === 'success') {
        iconDiv.innerHTML = '<i class="fas fa-check-circle"></i>';
        statusAreaDiv.style.background = '#e6f7ec';
        statusAreaDiv.style.border = '1px solid #b2e0b2';
        statusAreaDiv.style.color = '#0a3b2a';
      } else if (type === 'error') {
        iconDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
        statusAreaDiv.style.background = '#ffe8e6';
        statusAreaDiv.style.border = '1px solid #ffcdca';
        statusAreaDiv.style.color = '#9b2c1d';
      } else {
        iconDiv.innerHTML = '<i class="fas fa-info-circle"></i>';
        statusAreaDiv.style.background = '#f1f5f9';
        statusAreaDiv.style.border = '1px solid #e2edf2';
        statusAreaDiv.style.color = '#1e293b';
      }
      
      
    }
    
    async function copyToClipboard() {
      const textToCopy = textarea.value;
      
      if (textToCopy === "") {
        updateStatus("Nothing to copy — input is empty. Type something first.", "error");
        return false;
      }
      
      try {
        // Use modern clipboard API with fallback for older browsers
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(textToCopy);
          handleCopySuccess(textToCopy);
          return true;
        } else {
          // Fallback for older browsers (using execCommand)
          fallbackCopyText(textToCopy);
          handleCopySuccess(textToCopy);
          return true;
        }
      } catch (err) {
        console.error('Clipboard copy error:', err);
        updateStatus("Copy failed! Check permissions or try again.", "error");
        return false;
      }
    }
    
    function fallbackCopyText(text) {
      const textareaTemp = document.createElement('textarea');
      textareaTemp.value = text;
      textareaTemp.style.position = 'fixed';
      textareaTemp.style.top = '-9999px';
      textareaTemp.style.left = '-9999px';
      textareaTemp.style.opacity = '0';
      document.body.appendChild(textareaTemp);
      textareaTemp.select();
      textareaTemp.setSelectionRange(0, text.length);
      let success = false;
      try {
        success = document.execCommand('copy');
      } catch (err) {
        console.warn('execCommand copy error', err);
      }
      document.body.removeChild(textareaTemp);
      if (!success) {
        throw new Error('execCommand copy failed');
      }
    }
    
    function handleCopySuccess(copiedText) {

      let preview = copiedText;
      if (copiedText.length > 45) {
        preview = copiedText.substring(0, 42) + '...';
      }
      updateStatus(`Copied! “${preview}” is now on your clipboard.`, "success");
      
      copyButton.classList.add('success');
     
      setTimeout(() => {
        copyButton.classList.remove('success');
      }, 1500);
      
      textarea.style.transition = '0.1s';
      textarea.style.borderColor = '#2ecc71';
      setTimeout(() => {
        textarea.style.borderColor = '';
      }, 400);
    }
    
    // clear input field
    function clearInputField() {
      textarea.value = '';
      textarea.focus();
      updateStatus("Input cleared. Ready to copy new text.", "info");
      copyButton.classList.remove('success');
    }
    
    // insert sample demo text
    function insertSampleText() {
      const sampleText = `Hello from ClipSync!\nDeveloped by Anthony Karanja\nYou can copy any text, even multiline.\n Timestamp: ${new Date().toLocaleTimeString()}\nFeel free to edit and copy instantly.`;
      textarea.value = sampleText;
      textarea.focus();
      updateStatus("Sample text inserted — hit copy to test!", "info");
      
      textarea.dispatchEvent(new Event('input'));
      copyButton.classList.remove('success');
    }
    
    // Event listeners
    copyButton.addEventListener('click', (event) => {
      event.preventDefault();
      copyToClipboard();
    });
    
    clearBtn.addEventListener('click', () => {
      clearInputField();
    });
    
    sampleBtn.addEventListener('click', () => {
      insertSampleText();
    });
    
   
    textarea.addEventListener('keydown', (event) => {
      // Ctrl+Enter (or Cmd+Enter on Mac) triggers copy
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        event.preventDefault();
        copyToClipboard();
      }
    });
    
    textarea.addEventListener('input', () => {
      const currentMsg = statusMessageSpan.textContent;
      if (currentMsg.includes("empty") || currentMsg.includes("failed") || currentMsg.includes("Nothing to copy")) {
        if (textarea.value.trim() !== "") {
          updateStatus("Ready — new content detected, you can copy now.", "info");
        } else {
          updateStatus("Ready — type something to copy", "info");
        }
      } else if (currentMsg.includes("Copied!")) {
        if (textarea.value !== "") {
          updateStatus("Content changed — ready to copy new text", "info");
        } else {
          updateStatus("Input empty — add text to copy", "info");
        }
      }
      copyButton.classList.remove('success');
    });
    
    textarea.focus();
    
  
    textarea.addEventListener('focus', () => {
    });
    
    if (!navigator.clipboard && !window.isSecureContext) {
      updateStatus("<i class=\"fas fa-exclamation-triangle\"></i> Clipboard API limited: using fallback method. Works fine!", "info");
    } else if (!navigator.clipboard) {
      updateStatus("ℹ <i class=\"fas fa-info-circle\"></i> Using legacy copy method — fully functional.", "info");
    } else {
      
      console.log("Clipboard API ready");
    }
  })();
</script>
</body>
</html>
